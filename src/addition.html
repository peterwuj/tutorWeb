<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Addition – Math Fun</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <style>
    nav  { background: #3a2a00; border-bottom-color: #ffd700; }
    nav .logo { color: #ffd700; }
    .page-header h1 { color: #ffd700; }
    button.check-btn { background: #c8a000; color: #12121e; box-shadow: 0 4px 12px rgba(200,160,0,.5); }
  </style>
</head>
<body>

<nav>
  <span class="logo">🥷 Ninja Math</span>
  <a href="index.html">Home</a>
  <a href="numbers.html">Numbers</a>
  <a href="addition.html" class="active">Addition</a>
  <a href="subtraction.html">Subtraction</a>
  <a href="multiplication.html">Multiplication</a>
</nav>

<div class="page-header">
  <h1>⚔️ Addition!</h1>
  <p>Master the art of addition, young ninja!</p>
</div>

<div class="game-wrap">
  <div class="score-bar">
    <span>Score: <strong id="score">0</strong></span>
    <span class="stars" id="stars"></span>
    <span>Streak: <strong id="streak">0</strong> 🔥</span>
  </div>

  <div class="question-box">
    <div class="visuals" id="visuals"></div>
    <div class="eq" id="eq"></div>
    <div class="answer-row">
      <input type="number" id="ans" min="0" max="20" placeholder="?" autofocus />
      <button class="check-btn" onclick="checkAnswer()">Strike! 🥷</button>
    </div>
  </div>

  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" style="display:none" onclick="nextQuestion()">Next Mission ▶</button>
</div>

<script src="sounds.js"></script>
<script src="game.js"></script>
<script src="ninja-avatar.js"></script>
<script>
const _ninjaCorner = Object.assign(document.createElement('div'), {
  style: 'position:fixed;bottom:16px;right:16px;z-index:50'
});
document.body.appendChild(_ninjaCorner);
window._ninja = new NinjaAvatar(_ninjaCorner, { size: 110 });
window._ninja.pose('wave', 2200).say('Ready to train! 🥷', 2200);

initGame('addition');
</script>
</body>
</html>
