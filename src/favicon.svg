<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark background tile -->
  <rect width="32" height="32" rx="6" fill="#12121e"/>
  <!-- 4-pointed shuriken: outer r=13, inner r=5, centred 16,16 -->
  <polygon
    points="16,3 19.54,12.46 29,16 19.54,19.54 16,29 12.46,19.54 3,16 12.46,12.46"
    fill="#e94560"
    stroke="#ffd700"
    stroke-width="1"
    stroke-linejoin="round"
  />
  <!-- centre hole -->
  <circle cx="16" cy="16" r="3.8" fill="#12121e"/>
  <circle cx="16" cy="16" r="2.2" fill="#ffd700"/>
</svg>
