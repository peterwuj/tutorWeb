<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtraction – Math Fun</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <style>
    nav  { background: #500015; border-bottom-color: #e94560; }
    .page-header h1 { color: #e94560; }
  </style>
</head>
<body>

<nav>
  <span class="logo">🥷 Ninja Math</span>
  <a href="index.html">Home</a>
  <a href="numbers.html">Numbers</a>
  <a href="addition.html">Addition</a>
  <a href="subtraction.html" class="active">Subtraction</a>
  <a href="multiplication.html">Multiplication</a>
</nav>

<div class="page-header">
  <h1>🗡️ Subtraction!</h1>
  <p>A ninja must subtract to conquer the enemy!</p>
</div>

<div class="game-wrap">
  <div class="score-bar">
    <span>Score: <strong id="score">0</strong></span>
    <span class="stars" id="stars"></span>
    <span>Streak: <strong id="streak">0</strong> 🔥</span>
  </div>

  <div class="question-box">
    <div class="visuals" id="visuals"></div>
    <div class="eq" id="eq"></div>
    <div class="answer-row">
      <input type="number" id="ans" min="0" max="20" placeholder="?" autofocus />
      <button class="check-btn" onclick="checkAnswer()">Strike! 🥷</button>
    </div>
  </div>

  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" style="display:none" onclick="nextQuestion()">Next Mission ▶</button>
</div>

<script src="sounds.js"></script>
<script src="game.js"></script>
<script>
initGame('subtraction');
</script>
