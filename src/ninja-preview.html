  body {

    align-items: center;
    padding: 40px 20px;

  p.sub { margin: 0 0 28px; color: #8a7f80; }
  .stage {

    border-radius: 28px;

    overflow: hidden; position: relative;
  }
  .stage::before {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 88%, rgba(224,55,68,0.08), transparent 60%);
    pointer-events: none;
  }
  #ninja { width: 320px; height: 320px; }
  .controls {
    margin-top: 24px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  button {
    font: inherit; padding: 10px 18px; border: none; border-radius: 999px;
    background: var(--ink); color: #fff; cursor: pointer;
    font-weight: 600; font-size: 13px; letter-spacing: 0.02em;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  button:hover { transform: translateY(-2px); background: var(--accent); }
  button.ghost { background: transparent; color: var(--ink); border: 1.5px solid rgba(31,27,46,0.15); }
  button.ghost:hover { background: var(--ink); color: #fff; }
  code { background: rgba(0,0,0,0.06); padding: 2px 8px; border-radius: 6px; font-size: 13px; }
  .hint {
    margin-top: 18px; font-size: 13px; color: #7a7076;
    max-width: 420px; text-align: center; line-height: 1.5;
  }
</style>
